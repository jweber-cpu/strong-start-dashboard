name: Refresh Dashboard

on:
  schedule:
    - cron: '0 11 * * *'   # 7am ET (UTC-4 summer)
  workflow_dispatch:         # allow manual runs from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull Asana data
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
        run: python snapshot.py

      - name: Build metrics
        run: python metrics.py

      - name: Build standalone dashboard
        run: python build_standalone.py

      - name: Commit and push
        run: |
          cp dashboard.html index.html
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html snapshot.json metrics.json metrics.js dashboard.html
          git diff --cached --quiet || git commit -m "Update dashboard $(date +%Y-%m-%d)"
          git push
